<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Profile - Elite Study Tracker</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #3b82f6; --warning: #f59e0b; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 100%; max-width: 440px; padding: 1rem; }
        .auth-card { background: var(--card); padding: 2.25rem; border-radius: 16px; border: 1px solid #334155; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); }
        h2 { margin: 0 0 0.5rem 0; font-size: 1.75rem; color: #fff; text-align: center; }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.75rem; display: block; text-align: center; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #cbd5e1; margin-bottom: 0.4rem; }
        input { width: 100%; padding: 0.75rem; margin-bottom: 1.25rem; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; font-size: 0.95rem; }
        input:focus { border-color: var(--accent); outline: none; }
        button { width: 100%; padding: 0.75rem; border-radius: 6px; border: none; background: #10b981; color: white; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem; }
        button:hover { opacity: 0.9; }
        .auth-links { display: flex; justify-content: center; font-size: 0.85rem; margin-top: 1.5rem; }
        .auth-links a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .auth-links a:hover { text-decoration: underline; }
        .alert { background: #7c2d12; color: #fdba74; padding: 0.75rem; border-radius: 6px; border: 1px solid #9a3412; margin-bottom: 1.25rem; font-weight: 500; font-size: 0.85rem; text-align: center; }
        .back-home { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
        .back-home a { color: #94a3b8; text-decoration: none; }
        .back-home a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="auth-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="alert">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="auth-card">
            <h2>Create Account</h2>
            <span class="subtitle">Register your student profile.</span>
            
            <form action="/register" method="POST">
                <label for="reg_username">Username</label>
                <input id="reg_username" type="text" name="username" placeholder="e.g., student_name" required autocomplete="username">
                
                <label for="reg_email">Email</label>
                <input id="reg_email" type="email" name="email" placeholder="e.g., name@domain.com" required autocomplete="email">
                
                <label for="reg_password">Password</label>
                <input id="reg_password" type="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                
                <label for="reg_confirm">Confirm Password</label>
                <input id="reg_confirm" type="password" name="confirm_password" placeholder="••••••••" required autocomplete="new-password">
                
                <button type="submit">Register</button>
            </form>
            
            <div class="auth-links">
                <span style="color: #94a3b8; margin-right: 0.35rem;">Already have an account?</span>
                <a href="/login">Sign In Here</a>
            </div>
        </div>

        <div class="back-home">
            <a href="/welcome">← Back to Homepage</a>
        </div>
    </div>
</body>
</html>
